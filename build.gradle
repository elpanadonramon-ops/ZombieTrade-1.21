plugins {
    id 'fabric-loom' version '1.9-SNAPSHOT'
    id 'maven-publish'
}

version = "1.0.0"
group = "me.miguel.zombietrade"

base {
    archivesName = "ZombieTrade-1.21.11"
}

repositories {
    maven { url = "https://maven.fabricmc.net/" }
    maven { url = "https://libraries.minecraft.net/" } // Repositorio oficial de Mojang
    mavenCentral()
}

dependencies {
    // La versión de las Monturas del Caos
    minecraft "com.mojang:minecraft:1.21.11"
    
    // Usamos Yarn para la 1.21.1, que es compatible con la .11 y mucho más estable
    mappings "net.fabricmc:yarn:1.21.1+build.3:v2"
    
    modImplementation "net.fabricmc:fabric-loader:0.16.0"
    modImplementation "net.fabricmc.fabric-api:fabric-api:0.102.0+1.21"
}

processResources {
    inputs.property "version", project.version
    filesMatching("fabric.mod.json") {
        expand "version": project.version
    }
}

tasks.withType(JavaCompile).configureEach {
    it.options.release = 21
    // Esto asegura que el compilador busque los mappings de Minecraft
    it.options.encoding = "UTF-8"
}

java {
    withSourcesJar()
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

jar {
    from("LICENSE") {
        rename { "${it}_${project.base.archivesName.get()}"}
    }
}
