plugins {
    id 'fabric-loom' version '1.9-SNAPSHOT'
    id 'maven-publish'
}

version = "1.0.0"
group = "me.miguel.zombietrade"

base {
    archivesName = "ZombieTrade-1.21.11"
}

repositories {
    maven { url = "https://maven.fabricmc.net/" }
    mavenCentral()
}

loom {
    // Esto es vital para que no se confunda de versión al mapear
    splitEnvironmentSourceSets()
}

dependencies {
    // Mantenemos la versión de juego que quieres
    minecraft "com.mojang:minecraft:1.21.11"
    
    // TRUCO: Usamos los mappings de la 1.21.1 pero aplicados a la .11
    // Como son casi idénticas, esto evita que el Unpick explote
    mappings loom.layered() {
        mappings "net.fabricmc:yarn:1.21.1+build.3:v2"
    }
    
    modImplementation "net.fabricmc:fabric-loader:0.16.0"
    modImplementation "net.fabricmc.fabric-api:fabric-api:0.102.0+1.21"
}

processResources {
    inputs.property "version", project.version
    filesMatching("fabric.mod.json") {
        expand "version": project.version
    }
}

tasks.withType(JavaCompile).configureEach {
    it.options.release = 21
}

java {
    withSourcesJar()
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

jar {
    from("LICENSE") {
        rename { "${it}_${project.base.archivesName.get()}"}
    }
}
