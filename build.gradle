plugins {
    id 'fabric-loom' version '1.7.4'
    id 'maven-publish'
}

version = "1.0.0"
group = "me.miguel.zombietrade"

base {
    archivesName = "ZombieTrade-1.21.11"
}

repositories {
    maven { url = "https://maven.fabricmc.net/" }
    mavenCentral()
}

dependencies {
    // AHORA SÍ: 1.21.11 oficial de Monturas del Caos
    minecraft "com.mojang:minecraft:1.21.11"
    mappings loom.officialMojangMappings()
    
    modImplementation "net.fabricmc:fabric-loader:0.16.0"
    
    // Usamos la API de la 1.21 que es compatible con los Game Drops
    modImplementation "net.fabricmc.fabric-api:fabric-api:0.102.0+1.21"
}

processResources {
    inputs.property "version", project.version
    filesMatching("fabric.mod.json") {
        expand "version": project.version
    }
}

tasks.withType(JavaCompile).configureEach {
    it.options.release = 21
}

java {
    withSourcesJar()
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

jar {
    from("LICENSE") {
        rename { "${it}_${project.base.archivesName.get()}"}
    }
}
